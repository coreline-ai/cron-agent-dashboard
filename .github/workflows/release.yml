name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example v0.1.0'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'
          cache: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check
        run: make check VERSION=${{ steps.version.outputs.value }}

      - name: Build release artifacts
        run: make release-build VERSION=${{ steps.version.outputs.value }}

      - name: Release artifact smoke
        run: |
          # Verify the host-architecture binary at least runs --version and
          # the serve --help still lists the core flags before publishing.
          arch=$(uname -m)
          case "${arch}" in
            x86_64) suffix=linux-amd64 ;;
            aarch64|arm64) suffix=linux-arm64 ;;
            *) echo "release-smoke: unsupported arch ${arch}" >&2; exit 1 ;;
          esac
          chmod +x dist/cron-agent-dashboard-${suffix}
          ./scripts/release-smoke.sh dist/cron-agent-dashboard-${suffix}

      - name: Generate checksums
        run: |
          cd dist
          sha256sum cron-agent-dashboard-* > SHA256SUMS

      - name: Upload GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          target_commitish: ${{ github.sha }}
          name: cron-agent-dashboard ${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: |
            dist/cron-agent-dashboard-*
            dist/SHA256SUMS
