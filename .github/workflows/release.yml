name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example v0.1.0'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'
          cache: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check
        run: make check VERSION=${{ steps.version.outputs.value }}

      - name: Build release artifacts
        run: make release-build VERSION=${{ steps.version.outputs.value }}

      - name: Release artifact smoke
        run: |
          # Verify the host-architecture binary at least runs --version and
          # the serve --help still lists the core flags before publishing.
          arch=$(uname -m)
          case "${arch}" in
            x86_64) suffix=linux-amd64 ;;
            aarch64|arm64) suffix=linux-arm64 ;;
            *) echo "release-smoke: unsupported arch ${arch}" >&2; exit 1 ;;
          esac
          chmod +x dist/cron-agent-dashboard-${suffix}
          ./scripts/release-smoke.sh dist/cron-agent-dashboard-${suffix}

      - name: Generate checksums
        run: |
          cd dist
          sha256sum cron-agent-dashboard-* > SHA256SUMS

      - name: Render Homebrew formula
        run: |
          ./scripts/render-homebrew-formula.sh \
            ${{ steps.version.outputs.value }} \
            dist/SHA256SUMS \
            dist/cron-agent-dashboard.rb

      - name: Upload GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          target_commitish: ${{ github.sha }}
          name: cron-agent-dashboard ${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: |
            dist/cron-agent-dashboard-*
            dist/SHA256SUMS
            dist/cron-agent-dashboard.rb

      - name: Publish Homebrew tap (optional)
        # Operator opt-in. Set the HOMEBREW_TAP_REPO secret to a repo path
        # like "coreline-ai/homebrew-tap" and HOMEBREW_TAP_TOKEN to a PAT
        # with `repo` scope. The step copies the rendered formula into the
        # tap repo's Formula/ directory and opens a PR. When the secrets
        # are absent the step is a no-op and the rendered formula stays in
        # the release artifacts for manual publish.
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          HOMEBREW_TAP_REPO: ${{ secrets.HOMEBREW_TAP_REPO }}
        run: |
          set -euo pipefail
          if [[ -z "${HOMEBREW_TAP_REPO}" || -z "${GH_TOKEN}" ]]; then
            echo "skipping homebrew tap publish: HOMEBREW_TAP_REPO/HOMEBREW_TAP_TOKEN secret not set"
            exit 0
          fi
          version="${{ steps.version.outputs.value }}"
          branch="bump-cron-agent-dashboard-${version}"
          workdir="$(mktemp -d)"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${HOMEBREW_TAP_REPO}.git" "${workdir}"
          mkdir -p "${workdir}/Formula"
          cp dist/cron-agent-dashboard.rb "${workdir}/Formula/cron-agent-dashboard.rb"
          cd "${workdir}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${branch}"
          git add Formula/cron-agent-dashboard.rb
          git commit -m "cron-agent-dashboard ${version}"
          git push -u origin "${branch}"
          gh pr create \
            --title "cron-agent-dashboard ${version}" \
            --body "Automated bump for cron-agent-dashboard ${version}." \
            --head "${branch}" \
            --base main || true
